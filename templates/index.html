<!doctype html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ติดตามมือ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background: #f5f7fb;
            color: #111827;
        }

        .loading-overlay {
            display: none;
            z-index: 10;
            pointer-events: none;
        }

        .loading-overlay.is-visible {
            display: flex;
        }
    </style>
</head>

<body class="bg-light text-dark">
    <div class="container py-4">
        <div class="text-center mb-4">
            <h1 class="display-6 fw-bold">ติดตามมือ</h1>
            <p class="text-muted mb-0">
                ตรวจจับจุดมือแบบเรียลไทม์
            </p>
        </div>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card bg-white shadow-sm">
                    <div class="card-body p-3 position-relative canvas-frame">
                        <video id="video" autoplay muted playsinline class="d-none"></video>
                        <canvas id="canvas" width="640" height="480" class="w-100 rounded"></canvas>
                        <div class="position-absolute top-0 start-0 m-3">
                            <span class="badge bg-dark bg-opacity-75">สด</span>
                        </div>
                        <div class="position-absolute top-0 start-0 w-100 h-100 d-flex flex-column align-items-center justify-content-center loading-overlay"
                            id="loadingOverlay">
                            <!-- <div class="spinner-border text-success" role="status"></div> -->
                            <div id="loadingText" class="mt-2">กำลังโหลดโมเดล...</div>
                            <button id="retryButton" class="btn btn-success btn-sm mt-3 d-none">
                                ลองเปิดกล้องอีกครั้ง
                            </button>
                        </div>
                        <div class="badge-container position-absolute top-0 start-0 m-3 mt-5" id="badgeContainer"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-3 justify-content-center mt-4">
            <div class="col-md-4">
                <div class="card border-secondary h-100">
                    <div class="card-body text-center">
                        <div class="text-muted small">มือที่ตรวจพบ</div>
                        <div class="fs-3 fw-bold" id="handCount">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-secondary h-100">
                    <div class="card-body text-center">
                        <div class="text-muted small">มือซ้าย</div>
                        <div class="fs-3 fw-bold" id="leftGesture">—</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-secondary h-100">
                    <div class="card-body text-center">
                        <div class="text-muted small">มือขวา</div>
                        <div class="fs-3 fw-bold" id="rightGesture">—</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-lg-8">
                <div class="card status-card">
                    <div class="card-body">
                        <div class="text-muted small">ดีบัก</div>
                        <pre id="debugLog" class="mb-0 mt-2 text-dark small">รอผลตรวจจับ</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/static/script.js"></script>
</body>

</html>
